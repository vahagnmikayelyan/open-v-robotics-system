<div class="widget">

  <div class="widget-header">
    <span class="widget-label">HEADLIGHTS</span>

    <div class="actions">
      <button class="icon-btn link-btn" [class.active]="isLinked()" (click)="toggleLink()" title="Link sliders">🔗
      </button>
    </div>
  </div>

  <div class="widget-content">
    <div class="control-row">
      <div class="bulb-icon" [ngStyle]="getGlow(leftLed())">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path
            d="M12,2A7,7 0 0,0 5,9C5,11.38 6.19,13.47 8,14.74V17A1,1 0 0,0 9,18H15A1,1 0 0,0 16,17V14.74C17.81,13.47 19,11.38 19,9A7,7 0 0,0 12,2M9,21A1,1 0 0,0 10,22H14A1,1 0 0,0 15,21V20H9V21Z"/>
        </svg>
      </div>

      <input class="range-input" type="range" min="0" max="100" [ngModel]="leftLed()" (ngModelChange)="updateLeft($event)">

      <span class="val">{{ leftLed() }}%</span>
    </div>

    <div class="control-row">
      <div class="bulb-icon" [ngStyle]="getGlow(rightLed())">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path
            d="M12,2A7,7 0 0,0 5,9C5,11.38 6.19,13.47 8,14.74V17A1,1 0 0,0 9,18H15A1,1 0 0,0 16,17V14.74C17.81,13.47 19,11.38 19,9A7,7 0 0,0 12,2M9,21A1,1 0 0,0 10,22H14A1,1 0 0,0 15,21V20H9V21Z"/>
        </svg>
      </div>

      <input class="range-input" type="range" min="0" max="100" [ngModel]="rightLed()" (ngModelChange)="updateRight($event)">

      <span class="val">{{ rightLed() }}%</span>
    </div>
  </div>

</div>
