<div class="widget">

  <div class="widget-header">
    <span class="widget-label">Microphone</span>
    <div class="status-indicator" [ngClass]="status()">
      <span>{{ status() | uppercase }}</span>
    </div>
  </div>

  <div class="widget-content">
    <button class="action-btn" [ngClass]="status()" (click)="startLoopback()"
            [disabled]="status() !== 'idle' && status() !== 'recording'">

      <ng-container *ngIf="status() === 'idle'">
        <lucide-icon [img]="LucideIcons.Mic"></lucide-icon>
        <div class="btn-text">
          <span class="main">START MICROPHONE TEST</span>
          <span class="sub">Record {{ duration() }}s & Play</span>
        </div>
      </ng-container>

      <ng-container *ngIf="status() === 'recording'">
        <lucide-icon [img]="LucideIcons.Circle"></lucide-icon>
        <div class="btn-text">
          <span class="main">RECORDING... {{ timeLeft() }}s</span>
          <span class="sub">Speak into the mic</span>
        </div>
        <div class="progress-bar" [style.transition-duration]="'5s'"></div>
      </ng-container>

      <ng-container *ngIf="status() === 'playback'">
        <lucide-icon [img]="LucideIcons.Volume2"></lucide-icon>
        <div class="btn-text">
          <span class="main">PLAYING BACK...</span>
          <span class="sub">Listen to echo</span>
        </div>
      </ng-container>
    </button>
  </div>

</div>
