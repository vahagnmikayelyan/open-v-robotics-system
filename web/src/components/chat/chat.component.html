<div class="chat-wrapper">

  <div class="messages-container" #scrollContainer>
    <div class="message-row" *ngFor="let msg of messages()" [ngClass]="msg.type">
      <div class="bubble">
        <span *ngIf="msg.type === 'userCommand'" class="cmd-prefix">&gt;_</span>
        <span *ngIf="msg.type === 'systemCommand'" class="cmd-prefix">#</span>
        <span *ngIf="msg.type === 'system'" class="cmd-prefix">AI:</span>
        <span *ngIf="msg.type === 'systemError'" class="cmd-prefix">ERROR:</span>
        <span class="text-content">{{ msg.text }}</span>
      </div>

    </div>
  </div>

  <div class="input-area">
    <textarea
      #msgInput
      rows="1"
      placeholder="Enter command..."
      [(ngModel)]="inputText"
      (ngModelChange)="inputText.set($event)"
      (input)="adjustHeight(msgInput)"
      (keydown)="onKeydown($event, msgInput)"></textarea>
    <div class="input-actions">
      <button type="button" class="btn-clear" (click)="onClear()" title="Clear chat" aria-label="Clear chat">
        <lucide-icon [img]="LucideIcons.Trash2"></lucide-icon>
      </button>
      <button type="button" class="btn-send" (click)="onSend(msgInput)" title="Send" aria-label="Send message">
        <lucide-icon [img]="LucideIcons.Send"></lucide-icon>
      </button>
    </div>
  </div>

</div>
