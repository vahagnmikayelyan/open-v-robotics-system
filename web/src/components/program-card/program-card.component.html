<div class="program-card">
  <div class="tile-main" (click)="onSelect()">
    <lucide-icon [img]="LucideIcons.Zap" class="tile-icon"></lucide-icon>
    <div class="tile-name" [attr.title]="program().name">{{ program().name }}</div>
    <div class="tile-sub" [attr.title]="program().aiModel">{{ program().aiModel }}</div>
  </div>

  <div class="tile-footer">
    <div class="perm-tag" [class.full]="program().modules.length === this.totalModules()">
      Modules: {{ program().modules.length }}/{{ totalModules() }}
    </div>

    <div class="actions">
      <button type="button" class="action-btn edit" (click)="onEdit($event)" title="Edit program">
        <lucide-icon [img]="LucideIcons.SquarePen"></lucide-icon>
      </button>
      <button type="button" class="action-btn export" (click)="onExport($event)" title="Export program to JSON">
        <lucide-icon [img]="LucideIcons.Download"></lucide-icon>
      </button>
      <button type="button" class="action-btn delete" (click)="onDelete($event)" title="Delete program">
        <lucide-icon [img]="LucideIcons.Trash2"></lucide-icon>
      </button>
    </div>
  </div>
</div>
