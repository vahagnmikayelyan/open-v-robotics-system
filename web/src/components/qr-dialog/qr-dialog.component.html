<div class="modal-overlay" (click)="onClose()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">REMOTE CONTROL</div>

    <div class="qr-box">
      <img *ngIf="qrImageUrl()" [src]="qrImageUrl()" alt="QR Code" width="180" height="180" />
      <div *ngIf="!qrImageUrl()" class="loader-wrapper qr-loader">
        <ui-loader></ui-loader>
      </div>
    </div>

    <div class="ip-info">
      <div class="label">SCAN TO CONNECT</div>
      <div class="val">{{ connectionString() }}</div>
    </div>

    <button class="nav-btn back close-btn" (click)="onClose()">CLOSE</button>
  </div>
</div>
