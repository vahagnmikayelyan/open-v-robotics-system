<form class="edit-container" #configForm="ngForm" (ngSubmit)="save(configForm)">

  <div class="header">
    <button type="button" class="nav-btn back" routerLink="/menu">CANCEL</button>
    <span class="title">{{ !program().id ? 'NEW PROGRAM' : 'EDIT PROGRAM' }}</span>
    <button type="submit" class="nav-btn primary save-btn" [disabled]="configForm.invalid">SAVE</button>
  </div>

  <div *ngIf="isLoading()" class="loader-wrapper">
    <ui-loader></ui-loader>
  </div>

  <div *ngIf="!isLoading()" class="form-scroll">

    <div class="form-group">
      <label>PROGRAM NAME</label>
      <input type="text" name="progName" [(ngModel)]="program().name" required #nameField="ngModel"
             placeholder="e.g. Home Guard" class="input-dark" [class.error]="nameField.invalid && nameField.touched">
      <div *ngIf="nameField.invalid && nameField.touched" class="error-msg">Name is required.</div>
    </div>

    <div class="form-group">
      <label>SYSTEM INSTRUCTION</label>
      <textarea name="progInstruction" [(ngModel)]="program().systemInstruction" required #instructionField="ngModel"
                rows="6" placeholder="You are a helpful robot assistant..." class="input-dark"
                [class.error]="instructionField.invalid && instructionField.touched"></textarea>

      <div *ngIf="instructionField.invalid && instructionField.touched" class="error-msg">Instruction cannot be empty.
      </div>
    </div>

    <div class="form-group">
      <label>AI MODEL</label>
      <div class="select-wrapper">
        <select name="progAiModel" [(ngModel)]="program().aiModel" required #aiModelField="ngModel" class="input-dark"
                (ngModelChange)="onAIModelChange($event)" [class.error]="aiModelField.invalid && aiModelField.touched">

          <option value="" disabled *ngIf="!program().aiModel">Select an AI model...</option>

          <option *ngFor="let model of aiModels" [value]="model.id">
            {{ model.name }}
          </option>
        </select>
        <span class="arrow">▼</span>
      </div>

      <div class="error-msg" *ngIf="aiModelField.invalid && aiModelField.touched">
        Please select an AI model.
      </div>
    </div>

    <div class="form-group" *ngIf="aiVoices.length > 0">
      <label>VOICE</label>
      <div class="select-wrapper">
        <select name="progVoice" [(ngModel)]="program().voice" required #voiceField="ngModel" class="input-dark"
                [class.error]="voiceField.invalid && voiceField.touched">

          <option value="" disabled *ngIf="!program().voice">Select a voice...</option>
          <option *ngFor="let v of aiVoices" [value]="v">{{ v }}</option>
        </select>
        <span class="arrow">▼</span>
      </div>
      <div class="error-msg" *ngIf="voiceField.invalid && voiceField.touched">
        Please select a voice for this model.
      </div>
    </div>

    <div *ngFor="let cat of moduleCategories" class="category-section">
      <div class="category-header" *ngIf="getModulesByCategory(cat.id).length > 0">
        <label>{{ cat.label | uppercase }}</label>
        <div class="sub">{{ cat.description }}</div>
      </div>

      <ng-container *ngFor="let module of getModulesByCategory(cat.id)">
        <div class="form-group row">
          <div class="lbl-grp">
            <label>{{ module.name }}</label>
            <div class="sub">{{ module.description }}</div>
          </div>

          <div class="module-controls">
            <button *ngIf="module?.programConfigs?.length" type="button" class="settings-btn"
                    (click)="toggleSettings(module.id)" [class.active]="expandedSettings().has(module.id)"
                    [disabled]="!hasModule(module.id)">
              <lucide-icon [img]="LucideIcons.Settings"></lucide-icon>
            </button>

            <label class="toggle-switch">
              <input type="checkbox" [checked]="hasModule(module.id)" [disabled]="isRequiredModule(module.id)"
                     (change)="toggleModule(module.id, $any($event.target).checked)">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- Module Settings Section -->
        <div class="module-settings-panel" *ngIf="expandedSettings().has(module.id)">
          <config-field *ngFor="let config of module.programConfigs" [config]="config"
                        [name]="'config_' + module.id + '_' + config.key" [required]="hasModule(module.id)"
                        [(ngModel)]="program().moduleConfigs[module.id + '_' + config.key]">
          </config-field>
        </div>
        <!-- End Module Settings -->
      </ng-container>
    </div>

  </div>
</form>
