<div class="screen-container" (mousemove)="onMouseMove($event)" (dblclick)="onDoubleClick()" (mousedown)="startHold()"
  (mouseup)="endHold()" (mouseleave)="endHold()" (touchstart)="startHold()" (touchend)="endHold()"
  (touchcancel)="endHold()">

  <div class="main-page-header">
    <div class="program-bar" (mousedown)="$event.stopPropagation()" (touchstart)="$event.stopPropagation()">
      <span class="program-label" [class.idle]="!runningProgram()">
        {{ runningProgram() ? runningProgram()?.name : 'No program running' }}
      </span>
      <button *ngIf="runningProgram()" type="button" class="stop-btn" (click)="stopRunningProgram()">Stop</button>
    </div>

    <div class="right-panel">
      <div class="volume-control" (mousedown)="$event.stopPropagation()" (touchstart)="$event.stopPropagation()">
        <button class="volume-btn" (click)="toggleVolumePanel()">
          <lucide-icon [img]="volumeIcon()" class="icon"></lucide-icon>
        </button>
        <div class="volume-panel" *ngIf="isVolumePanelOpen()" [class.muted]="isMuted()">
          <button class="mute-btn" (click)="toggleMute()">
            <lucide-icon [img]="isMuted() ? LucideIcons.VolumeX : LucideIcons.Volume2" class="icon"></lucide-icon>
          </button>
          <input class="range-input" type="range" min="0" max="100" [value]="volumeLevel()"
            (input)="onVolumeChange($event)" />
          <span class="volume-value">{{ volumeLevel() }}%</span>
        </div>
      </div>
      <battery-status [level]="batteryLevel()"></battery-status>
      <button class="power-btn" (click)="openPowerMenu()" (mousedown)="$event.stopPropagation()"
        (touchstart)="$event.stopPropagation()">
        <lucide-icon [img]="LucideIcons.Power" class="icon"></lucide-icon>
      </button>
    </div>
  </div>

  <!-- Robot face (default state) -->
  <div class="face-layer" [class.closing]="isBlinking()">

    <div class="eye left">
      <div class="eyelid top"></div>
      <div class="eyelid bottom"></div>

      <div class="pupil" [style.transform]="'translate(' + pupilOffset().x + 'px, ' + pupilOffset().y + 'px)'">
        <div class="glint"></div>
      </div>
    </div>

    <div class="eye right">
      <div class="eyelid top"></div>
      <div class="eyelid bottom"></div>
      <div class="pupil" [style.transform]="'translate(' + pupilOffset().x + 'px, ' + pupilOffset().y + 'px)'">
        <div class="glint"></div>
      </div>
    </div>

  </div>

  <!-- Media overlay -->
  <div class="media-overlay" *ngIf="displayMedia() as media">
    <img *ngIf="media.type === 'image'" [src]="media.url" class="fullscreen-image" />
  </div>

  <!-- Poll overlay -->
  <div class="poll-overlay" *ngIf="activePoll() as poll" (mousedown)="$event.stopPropagation()"
    (touchstart)="$event.stopPropagation()">
    <p class="poll-question" *ngIf="poll.question">{{ poll.question }}</p>
    <div class="poll-options">
      <button *ngFor="let opt of poll.options" [disabled]="isPollAnswered()" class="poll-btn"
        (click)="onPollAnswer(opt)">
        {{ opt }}
      </button>
    </div>
  </div>

</div>
