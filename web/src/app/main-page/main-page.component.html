<div class="screen-container" (dblclick)="onDoubleClick()" (mousedown)="startHold()"
  (mouseup)="endHold()" (mouseleave)="endHold()" (touchstart)="startHold()" (touchend)="endHold()"
  (touchcancel)="endHold()">

  <div class="main-page-header">
    <div class="program-bar" (mousedown)="$event.stopPropagation()" (touchstart)="$event.stopPropagation()">
      <span class="program-label" [class.idle]="!runningProgram()">
        {{ runningProgram() ? runningProgram()?.name : 'No program running' }}
      </span>
      <button *ngIf="runningProgram()" type="button" class="stop-btn" (click)="stopRunningProgram()">Stop</button>
    </div>

    <div class="right-panel">
      <!-- Active Peripherals Indicators (Mic / Camera in use) -->
      <div class="peripherals-indicators" *ngIf="runningProgram()">
        <div class="indicator-pill mic" *ngIf="isMicEnabled()" title="Microphone in use">
          <lucide-icon [img]="LucideIcons.Mic" class="indicator-icon"></lucide-icon>
          <span class="pulse-dot mic-dot"></span>
        </div>
        <div class="indicator-pill camera" *ngIf="isCameraEnabled()" title="Camera in use">
          <lucide-icon [img]="LucideIcons.Camera" class="indicator-icon"></lucide-icon>
          <span class="pulse-dot camera-dot"></span>
        </div>
      </div>

      <div class="volume-control" (mousedown)="$event.stopPropagation()" (touchstart)="$event.stopPropagation()">
        <button class="volume-btn" (click)="toggleVolumePanel()">
          <lucide-icon [img]="volumeIcon()" class="icon"></lucide-icon>
        </button>
        <div class="volume-panel" *ngIf="isVolumePanelOpen()" [class.muted]="isMuted()">
          <button class="mute-btn" (click)="toggleMute()">
            <lucide-icon [img]="isMuted() ? LucideIcons.VolumeX : LucideIcons.Volume2" class="icon"></lucide-icon>
          </button>
          <range-input [min]="0" [max]="100" [ngModel]="volumeLevel()" (ngModelChange)="onVolumeChange($event)"></range-input>
          <span class="volume-value">{{ volumeLevel() }}%</span>
        </div>
      </div>
      <battery-status [level]="batteryLevel()"></battery-status>
      <button class="power-btn" (click)="openPowerMenu()" (mousedown)="$event.stopPropagation()"
        (touchstart)="$event.stopPropagation()">
        <lucide-icon [img]="LucideIcons.Power" class="icon"></lucide-icon>
      </button>
    </div>
  </div>

  <!-- Robot face (dynamic emotions and premium design) -->
  <div [class]="'face-layer emotion-' + emotion()" [class.closing]="isBlinking()">

    <div class="eye left" [class.winking]="winkLeft()">
      <div class="eyelid top"></div>
      <div class="eyelid bottom"></div>

      <!-- Cybernetic overlay details for premium sci-fi aesthetics -->
      <div class="cyber-ring"></div>
      <div class="iris-pattern"></div>

      <div class="pupil" [style.transform]="'translate(' + pupilOffset().x + 'px, ' + pupilOffset().y + 'px)'">
        <div class="glint glint-1"></div>
        <div class="glint glint-2"></div>
      </div>
    </div>

    <div class="eye right" [class.winking]="winkRight()">
      <div class="eyelid top"></div>
      <div class="eyelid bottom"></div>

      <!-- Cybernetic overlay details for premium sci-fi aesthetics -->
      <div class="cyber-ring"></div>
      <div class="iris-pattern"></div>

      <div class="pupil" [style.transform]="'translate(' + pupilOffset().x + 'px, ' + pupilOffset().y + 'px)'">
        <div class="glint glint-1"></div>
        <div class="glint glint-2"></div>
      </div>
    </div>

  </div>

  <!-- Media overlay -->
  <div class="media-overlay" *ngIf="displayMedia() as media">
    <img *ngIf="media.type === 'image'" [src]="media.url" class="fullscreen-image" />
  </div>

  <!-- Poll overlay -->
  <div class="poll-overlay" *ngIf="activePoll() as poll" (mousedown)="$event.stopPropagation()"
    (touchstart)="$event.stopPropagation()">
    <p class="poll-question" *ngIf="poll.question">{{ poll.question }}</p>
    <div class="poll-options">
      <button *ngFor="let opt of poll.options" [disabled]="isPollAnswered()" class="poll-btn"
        (click)="onPollAnswer(opt)">
        {{ opt }}
      </button>
    </div>
  </div>

  <!-- List overlay -->
  <div class="list-overlay" *ngIf="activeList() as items" (mousedown)="$event.stopPropagation()"
    (touchstart)="$event.stopPropagation()">
    <div class="list-container">
      <div class="list-items scroll-container" dragScroll>
        <div *ngFor="let item of items; let i = index" class="list-item" [class.checked]="item.checked"
          [style.animation-delay]="(i * 60) + 'ms'" (click)="onListItemToggle(item.text)">
          <span class="list-item-checkbox">
            <span class="checkmark" *ngIf="item.checked">✓</span>
          </span>
          <span class="list-item-text">{{ item.text }}</span>
          <button class="list-item-delete" (click)="onListItemDelete(item.text); $event.stopPropagation()">
            <lucide-icon [img]="LucideIcons.Trash2"></lucide-icon>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
