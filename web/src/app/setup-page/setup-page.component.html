<div class="setup-container">

  <div class="header">
    <button class="nav-btn back" routerLink="/menu">BACK</button>
    <span class="title">SYSTEM SETTINGS</span>
    <button class="nav-btn primary save-btn" (click)="save()">SAVE</button>
  </div>

  <div class="settings-scroll">

    <ng-container *ngFor="let group of schema()">
      <div class="section-title">{{ group.name }}</div>
      <div class="card-group">
        <ng-container *ngFor="let req of group.configs">
          <div class="setting-row">
            <div class="label-group">
              <span class="lbl">{{ req.label }}</span>
              <span class="sub" *ngIf="req.hint">{{ req.hint }}</span>
            </div>
            <div class="value-group">
              <ng-container *ngIf="req.type === 'range'; else textInput">
                <div class="value-display">{{ configs()[req.key] || 0 }}%</div>
                <input type="range" [(ngModel)]="configs()[req.key]" [attr.min]="req.min || 0" [attr.max]="req.max || 100" class="range-input">
              </ng-container>
              <ng-template #textInput>
                <input [type]="req.type || 'text'" [(ngModel)]="configs()[req.key]" class="input-dark" autocomplete="off">
              </ng-template>
            </div>
          </div>
        </ng-container>
      </div>
    </ng-container>

    <div class="info-block">
      <div>System Version: v{{ platformVersion() }}</div>
    </div>

  </div>
</div>
