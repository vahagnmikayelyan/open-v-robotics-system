<div class="menu-container">

  <div class="top-bar">
    <button class="nav-btn back" routerLink="/">BACK</button>

    <button class="nav-btn" (click)="openConnectDialog()">
      <lucide-icon [img]="LucideIcons.QrCode" class="icon"></lucide-icon>
    </button>

    <button class="nav-btn" routerLink="/setup">
      <lucide-icon [img]="LucideIcons.Settings" class="icon"></lucide-icon>
    </button>

    <button class="nav-btn" routerLink="/devtools">
      <lucide-icon [img]="LucideIcons.Wrench" class="icon"></lucide-icon>
    </button>
  </div>

  <div class="divider">SELECT PROGRAM</div>

  <div *ngIf="isLoading()" class="loader-wrapper">
    <ui-loader></ui-loader>
  </div>

  <div *ngIf="!isLoading()" class="programs-grid">
    <program-card
      *ngFor="let prog of programs()"
      [program]="prog"
      [totalModules]="totalModules()"
      (select)="startProgram($event)"
      (edit)="editProgram($event)"
      (deleteRequest)="requestDeleteProgram($event)"
    />

    <button type="button" class="program-card add-new" (click)="createProgram()">
      <lucide-icon [img]="LucideIcons.Plus" class="plus-icon"></lucide-icon>
      <div class="tile-name">Add program</div>
    </button>
  </div>

  <div class="modal-overlay" *ngIf="isConnectDialogOpen()" (click)="closeConnectDialog()">

    <div class="modal-card" (click)="$event.stopPropagation()">

      <div class="modal-header">REMOTE CONTROL</div>

      <div class="qr-box">
        <img *ngIf="qrImageUrl()" [src]="qrImageUrl()" alt="QR Code" width="180" height="180"/>
        <div *ngIf="!qrImageUrl()" class="loader-wrapper qr-loader">
          <ui-loader></ui-loader>
        </div>
      </div>

      <div class="ip-info">
        <div class="label">SCAN TO CONNECT</div>
        <div class="val">{{ connectionString() }}</div>
      </div>

      <button class="nav-btn back close-btn" (click)="closeConnectDialog()">CLOSE</button>
    </div>
  </div>

</div>
