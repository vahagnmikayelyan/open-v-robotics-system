<div class="menu-container">
  <div class="top-bar">
    <button class="nav-btn back" routerLink="/">BACK</button>

    <button class="nav-btn" (click)="openConnectDialog()" title="Remote Control QR Code">
      <lucide-icon [img]="LucideIcons.QrCode" class="icon"></lucide-icon>
    </button>

    <button class="nav-btn" (click)="isWifiDialogOpen.set(true)" title="Configure Wi-Fi">
      <lucide-icon [img]="LucideIcons.Wifi" class="icon"></lucide-icon>
    </button>

    <button class="nav-btn" routerLink="/setup">
      <lucide-icon [img]="LucideIcons.Settings" class="icon"></lucide-icon>
    </button>

    <button class="nav-btn" routerLink="/devtools">
      <lucide-icon [img]="LucideIcons.Wrench" class="icon"></lucide-icon>
    </button>

    <button class="nav-btn warning import-btn" (click)="importFileInput.click()" title="Import program(s) from JSON">
      <lucide-icon [img]="LucideIcons.Upload" class="icon"></lucide-icon>
    </button>

    <button class="nav-btn success export-all-btn" (click)="exportAllPrograms()" title="Export all programs to JSON">
      <lucide-icon [img]="LucideIcons.Download" class="icon"></lucide-icon>
    </button>
  </div>

  <!-- Hidden file input for import -->
  <input #importFileInput type="file" accept=".json" style="display: none" (change)="importProgram($event)" />

  <div class="divider">SELECT PROGRAM</div>

  <div *ngIf="isLoading()" class="loader-wrapper">
    <ui-loader></ui-loader>
  </div>

  <div *ngIf="!isLoading()" class="programs-grid scroll-container" dragScroll>
    <program-card
      *ngFor="let prog of programs()"
      [program]="prog"
      [totalModules]="totalModules()"
      (select)="startProgram($event)"
      (edit)="editProgram($event)"
      (deleteRequest)="requestDeleteProgram($event)"
      (export)="exportSingleProgram($event)"
    />

    <!-- Import placeholder card -->
    <button
      type="button"
      class="program-card add-new import-card"
      (click)="importFileInput.click()"
      title="Import program from JSON"
    >
      <div class="add-new-content">
        <lucide-icon [img]="LucideIcons.Upload" class="plus-icon"></lucide-icon>
        <div class="tile-name">Import program</div>
      </div>
    </button>

    <button type="button" class="program-card add-new" (click)="createProgram()">
      <div class="add-new-content">
        <lucide-icon [img]="LucideIcons.Plus" class="plus-icon"></lucide-icon>
        <div class="tile-name">Add program</div>
      </div>
    </button>
  </div>

  <qr-dialog *ngIf="isConnectDialogOpen()" (close)="isConnectDialogOpen.set(false)"></qr-dialog>

  <wifi-dialog *ngIf="isWifiDialogOpen()" (close)="isWifiDialogOpen.set(false)"></wifi-dialog>
</div>
